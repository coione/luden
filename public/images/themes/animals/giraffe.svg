<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="#FFF5E0"/>

  <!-- Neck -->
  <rect x="78" y="115" width="44" height="88" rx="12" fill="#F9C74F"/>
  <!-- Neck spots -->
  <ellipse cx="90" cy="132" rx="10" ry="7" fill="#C47A1E"/>
  <ellipse cx="112" cy="148" rx="9" ry="6" fill="#C47A1E"/>
  <ellipse cx="88" cy="164" rx="8" ry="6" fill="#C47A1E"/>
  <ellipse cx="112" cy="178" rx="9" ry="6" fill="#C47A1E"/>

  <!-- Head -->
  <ellipse cx="100" cy="90" rx="40" ry="34" fill="#F9C74F"/>

  <!-- Ossicones (horns) -->
  <rect x="82" y="56" width="9" height="26" rx="4.5" fill="#C47A1E"/>
  <rect x="109" y="56" width="9" height="26" rx="4.5" fill="#C47A1E"/>
  <circle cx="86.5" cy="56" r="6" fill="#8B5A1A"/>
  <circle cx="113.5" cy="56" r="6" fill="#8B5A1A"/>

  <!-- Eyes white -->
  <ellipse cx="83" cy="88" rx="12" ry="13" fill="white"/>
  <ellipse cx="117" cy="88" rx="12" ry="13" fill="white"/>
  <!-- Iris -->
  <circle cx="85" cy="90" r="8" fill="#5D3A1A"/>
  <circle cx="119" cy="90" r="8" fill="#5D3A1A"/>
  <!-- Pupil -->
  <circle cx="85" cy="90" r="5" fill="#1A1A1A"/>
  <circle cx="119" cy="90" r="5" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="82" cy="87" r="2.5" fill="white"/>
  <circle cx="116" cy="87" r="2.5" fill="white"/>

  <!-- Lashes (left eye) -->
  <line x1="74" y1="79" x2="71" y2="74" stroke="#5D3A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="79" y1="76" x2="77" y2="71" stroke="#5D3A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="84" y1="75" x2="84" y2="70" stroke="#5D3A1A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lashes (right eye) -->
  <line x1="108" y1="79" x2="106" y2="74" stroke="#5D3A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="113" y1="76" x2="112" y2="71" stroke="#5D3A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="118" y1="75" x2="119" y2="70" stroke="#5D3A1A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Snout -->
  <ellipse cx="100" cy="108" rx="24" ry="16" fill="#F0B030"/>
  <!-- Nostrils -->
  <ellipse cx="92" cy="110" rx="4.5" ry="3.5" fill="#C47A1E"/>
  <ellipse cx="108" cy="110" rx="4.5" ry="3.5" fill="#C47A1E"/>

  <!-- Smile -->
  <path d="M 86,118 Q 100,128 114,118" stroke="#5D3A1A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Head spots -->
  <ellipse cx="68" cy="92" rx="7" ry="6" fill="#C47A1E"/>
  <ellipse cx="130" cy="86" rx="6" ry="5" fill="#C47A1E"/>
</svg>
