<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="#FFF8E7"/>

  <!-- Left ear outer -->
  <polygon points="52,90 28,38 80,70" fill="#F4A261"/>
  <!-- Left ear inner -->
  <polygon points="58,86 42,52 74,72" fill="#FFCBA4"/>

  <!-- Right ear outer -->
  <polygon points="148,90 172,38 120,70" fill="#F4A261"/>
  <!-- Right ear inner -->
  <polygon points="142,86 158,52 126,72" fill="#FFCBA4"/>

  <!-- Head -->
  <circle cx="100" cy="112" r="62" fill="#F4A261"/>

  <!-- Forehead stripes -->
  <path d="M 88,60 Q 100,54 112,60" stroke="#D4802A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 84,68 Q 100,58 116,68" stroke="#D4802A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyes white -->
  <ellipse cx="80" cy="104" rx="14" ry="15" fill="white"/>
  <ellipse cx="120" cy="104" rx="14" ry="15" fill="white"/>
  <!-- Iris -->
  <ellipse cx="80" cy="106" rx="8" ry="13" fill="#4CAF50"/>
  <ellipse cx="120" cy="106" rx="8" ry="13" fill="#4CAF50"/>
  <!-- Pupil -->
  <ellipse cx="80" cy="106" rx="4" ry="12" fill="#1A1A1A"/>
  <ellipse cx="120" cy="106" rx="4" ry="12" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="76" cy="100" r="3" fill="white"/>
  <circle cx="116" cy="100" r="3" fill="white"/>

  <!-- Nose -->
  <polygon points="100,120 93,128 107,128" fill="#E8557A"/>

  <!-- Mouth -->
  <path d="M 93,128 Q 100,136 107,128" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="100" y1="120" x2="100" y2="128" stroke="#1A1A1A" stroke-width="1.5"/>

  <!-- Whiskers left -->
  <line x1="32" y1="122" x2="88" y2="124" stroke="#8B6914" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="35" y1="132" x2="88" y2="130" stroke="#8B6914" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Whiskers right -->
  <line x1="112" y1="124" x2="168" y2="122" stroke="#8B6914" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="112" y1="130" x2="165" y2="132" stroke="#8B6914" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Cheeks -->
  <circle cx="64" cy="124" r="12" fill="#F0A0A0" opacity="0.45"/>
  <circle cx="136" cy="124" r="12" fill="#F0A0A0" opacity="0.45"/>
</svg>
