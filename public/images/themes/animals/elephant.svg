<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="#EEE8FF"/>

  <!-- Left ear -->
  <ellipse cx="38" cy="100" rx="32" ry="44" fill="#A8BDD0"/>
  <ellipse cx="38" cy="100" rx="22" ry="30" fill="#F4B8C8"/>

  <!-- Right ear -->
  <ellipse cx="162" cy="100" rx="32" ry="44" fill="#A8BDD0"/>
  <ellipse cx="162" cy="100" rx="22" ry="30" fill="#F4B8C8"/>

  <!-- Head -->
  <circle cx="100" cy="95" r="62" fill="#9EB8CC"/>

  <!-- Trunk -->
  <path d="M 84,145 Q 72,162 76,182 Q 82,196 96,190 Q 112,184 110,170 Q 116,155 106,143"
        fill="#8CAABF" stroke="#8CAABF" stroke-width="1"/>

  <!-- Eyes white -->
  <circle cx="78" cy="84" r="14" fill="white"/>
  <circle cx="122" cy="84" r="14" fill="white"/>
  <!-- Iris -->
  <circle cx="80" cy="86" r="9" fill="#3D5A70"/>
  <circle cx="124" cy="86" r="9" fill="#3D5A70"/>
  <!-- Pupil -->
  <circle cx="80" cy="86" r="5.5" fill="#1A1A1A"/>
  <circle cx="124" cy="86" r="5.5" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="77" cy="83" r="2.5" fill="white"/>
  <circle cx="121" cy="83" r="2.5" fill="white"/>

  <!-- Eyebrows -->
  <path d="M 66,70 Q 78,64 90,70" stroke="#5A7A90" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 110,70 Q 122,64 134,70" stroke="#5A7A90" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Wrinkles on trunk -->
  <path d="M 84,152 Q 80,158 84,164" stroke="#7A9AB0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 88,162 Q 84,168 88,174" stroke="#7A9AB0" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M 84,120 Q 100,132 116,120" stroke="#5A7A90" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Tusk hints -->
  <ellipse cx="87" cy="134" rx="6" ry="4" fill="#F0EAD6" transform="rotate(-20, 87, 134)"/>
  <ellipse cx="113" cy="134" rx="6" ry="4" fill="#F0EAD6" transform="rotate(20, 113, 134)"/>
</svg>
