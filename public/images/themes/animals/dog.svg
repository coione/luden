<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="#EDF6FF"/>

  <!-- Floppy ears -->
  <ellipse cx="58" cy="118" rx="28" ry="42" fill="#C8860A" transform="rotate(-12, 58, 118)"/>
  <ellipse cx="142" cy="118" rx="28" ry="42" fill="#C8860A" transform="rotate(12, 142, 118)"/>
  <!-- Inner ear texture -->
  <ellipse cx="58" cy="122" rx="18" ry="30" fill="#D4920E" transform="rotate(-12, 58, 122)" opacity="0.5"/>
  <ellipse cx="142" cy="122" rx="18" ry="30" fill="#D4920E" transform="rotate(12, 142, 122)" opacity="0.5"/>

  <!-- Head -->
  <circle cx="100" cy="100" r="62" fill="#E8A820"/>

  <!-- Snout -->
  <ellipse cx="100" cy="124" rx="30" ry="22" fill="#D4921A"/>

  <!-- Eyes white -->
  <circle cx="78" cy="90" r="15" fill="white"/>
  <circle cx="122" cy="90" r="15" fill="white"/>
  <!-- Iris -->
  <circle cx="80" cy="92" r="10" fill="#5D3A1A"/>
  <circle cx="124" cy="92" r="10" fill="#5D3A1A"/>
  <!-- Pupil -->
  <circle cx="80" cy="92" r="6" fill="#1A1A1A"/>
  <circle cx="124" cy="92" r="6" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="76" cy="88" r="3.5" fill="white"/>
  <circle cx="120" cy="88" r="3.5" fill="white"/>

  <!-- Eyebrows -->
  <path d="M 66,76 Q 78,70 90,76" stroke="#5D3A1A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 110,76 Q 122,70 134,76" stroke="#5D3A1A" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="100" cy="116" rx="15" ry="11" fill="#3D2B1F"/>
  <ellipse cx="96" cy="113" rx="4.5" ry="3.5" fill="#5D4B4F"/>

  <!-- Mouth -->
  <path d="M 82,128 Q 100,142 118,128" stroke="#3D2B1F" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="100" cy="143" rx="11" ry="9" fill="#FF8FAB"/>
  <line x1="100" y1="136" x2="100" y2="152" stroke="#E07090" stroke-width="1.5"/>

  <!-- Cheeks -->
  <circle cx="64" cy="120" r="12" fill="#F0A0A0" opacity="0.45"/>
  <circle cx="136" cy="120" r="12" fill="#F0A0A0" opacity="0.45"/>
</svg>
